<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Technical blog by Dhiraj Roy covering backend development, AI/ML, Android, and automation.">
    <link rel="canonical" href="https://dhirajroy.com/blog">
    
    <title>Blog - Dhiraj Roy</title>
    
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <div id="navbar"></div>
    
    <main>
        <section class="blog-section">
            <div class="container">
                <h1>Blog</h1>
                <p class="section-description">Thoughts on backend development, AI/ML, automation, and software engineering.</p>
                
                <div class="blog-redirect">
                    <div class="blog-card">
                        <h2>Read My Latest Posts</h2>
                        <p>Check out my technical blog where I share insights, tutorials, and experiences from my journey as a developer.</p>
                        <a href="/blog/" class="btn btn-primary">Visit Blog →</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <div id="footer"></div>
    
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadComponent('navbar', 'navbar');
            loadComponent('footer', 'footer');
        });
    </script>
</body>
</html>
