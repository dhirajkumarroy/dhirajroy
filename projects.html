<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore Dhiraj Roy's portfolio of backend projects, AI/ML applications, Android apps, and automation solutions.">
    <meta name="keywords" content="Spring Boot projects, AI/ML portfolio, Android apps, n8n automation, backend projects">
    <link rel="canonical" href="https://dhirajroy.com/projects">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Projects - Dhiraj Roy Portfolio">
    <meta property="og:description" content="Showcasing backend, AI/ML, Android, and automation projects.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dhirajroy.com/projects">
    
    <title>Projects - Dhiraj Roy Portfolio</title>
    
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/pages/projects.css">
</head>
<body>
    <div id="navbar"></div>
    
    <main>
        <section class="projects-section">
            <div class="container">
                <h1>My Projects</h1>
                <p class="section-description">A collection of my work in backend development, AI/ML, Android, and automation.</p>
                
                <!-- Filter Buttons -->
                <div class="project-filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="backend">Backend</button>
                    <button class="filter-btn" data-filter="ai_ml">AI/ML</button>
                    <button class="filter-btn" data-filter="android">Android</button>
                    <button class="filter-btn" data-filter="automation">Automation</button>
                </div>
                
                <!-- Projects Grid -->
                <div class="projects-grid" id="projects-grid">
                    <!-- Projects will be loaded dynamically -->
                </div>
            </div>
        </section>
    </main>
    
    <div id="footer"></div>
    
    <script src="/assets/js/main.js"></script>
    <script>
        // Load components and projects
        document.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('navbar', 'navbar');
            await loadComponent('footer', 'footer');
            
            // Load SITE_CONFIG
            const configScript = document.createElement('script');
            configScript.src = '/config/site.js';
            configScript.onload = () => {
                renderProjects('all');
                setupFilters();
            };
            document.head.appendChild(configScript);
        });
        
        function renderProjects(category) {
            const projectsGrid = document.getElementById('projects-grid');
            if (!projectsGrid || typeof SITE_CONFIG === 'undefined') return;
            
            const filteredProjects = category === 'all' 
                ? SITE_CONFIG.projects 
                : SITE_CONFIG.projects.filter(p => p.category === category);
            
            projectsGrid.innerHTML = filteredProjects.map(project => `
                <div class="project-card" data-category="${project.category}">
                    <img src="/assets/images/${project.image}" alt="${project.title}" class="project-image" loading="lazy">
                    <div class="project-content">
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                        <div class="project-tech">
                            ${project.tech.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                        </div>
                        <div class="project-links">
                            <a href="${project.github}" target="_blank" rel="noopener" class="github-link">GitHub →</a>
                            ${project.demo ? `<a href="${project.demo}" target="_blank" rel="noopener" class="demo-link">Live Demo →</a>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            
            if (filteredProjects.length === 0) {
                projectsGrid.innerHTML = '<p class="no-projects">No projects found in this category.</p>';
            }
        }
        
        function setupFilters() {
            const filters = document.querySelectorAll('.filter-btn');
            filters.forEach(filter => {
                filter.addEventListener('click', () => {
                    filters.forEach(f => f.classList.remove('active'));
                    filter.classList.add('active');
                    const category = filter.getAttribute('data-filter');
                    renderProjects(category);
                });
            });
        }
    </script>
</body>
</html>
